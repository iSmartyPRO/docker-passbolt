services:
  passbolt:
    container_name: ${DOCKER_CONTAINER_NAME}
    image: passbolt/passbolt:latest-ce
    restart: unless-stopped
    tty: true
    entrypoint: ["/entrypoint-wrapper.sh"]
    environment:
      APP_FULL_BASE_URL: ${APP_FULL_BASE_URL}
      DATASOURCES_DEFAULT_HOST: ${DATASOURCES_DEFAULT_HOST}
      DATASOURCES_DEFAULT_USERNAME: ${DATASOURCES_DEFAULT_USERNAME}
      DATASOURCES_DEFAULT_PASSWORD: ${DATASOURCES_DEFAULT_PASSWORD}
      DATASOURCES_DEFAULT_DATABASE: ${DATASOURCES_DEFAULT_DATABASE}
      EMAIL_DEFAULT_FROM_NAME: ${EMAIL_DEFAULT_FROM_NAME}
      EMAIL_DEFAULT_FROM: ${EMAIL_DEFAULT_FROM}
      EMAIL_TRANSPORT_DEFAULT_HOST: ${EMAIL_TRANSPORT_DEFAULT_HOST}
      EMAIL_TRANSPORT_DEFAULT_PORT: ${EMAIL_TRANSPORT_DEFAULT_PORT}
      EMAIL_TRANSPORT_DEFAULT_USERNAME: ${EMAIL_TRANSPORT_DEFAULT_USERNAME}
      EMAIL_TRANSPORT_DEFAULT_PASSWORD: ${EMAIL_TRANSPORT_DEFAULT_PASSWORD}
      EMAIL_TRANSPORT_DEFAULT_TLS: ${EMAIL_TRANSPORT_DEFAULT_TLS}
      PASSBOLT_GPG_SERVER_KEY_FINGERPRINT: ${PASSBOLT_GPG_SERVER_KEY_FINGERPRINT}
      PASSBOLT_SSL_FORCE: ${PASSBOLT_SSL_FORCE}
      PASSBOLT_SECURITY_SMTP_SETTINGS_ENDPOINTS_DISABLED: ${PASSBOLT_SECURITY_SMTP_SETTINGS_ENDPOINTS_DISABLED}
      PASSBOLT_PLUGINS_SMTP_SETTINGS_SECURITY_SSL_VERIFY_PEER: ${PASSBOLT_PLUGINS_SMTP_SETTINGS_SECURITY_SSL_VERIFY_PEER}
      PASSBOLT_PLUGINS_SMTP_SETTINGS_SECURITY_SSL_VERIFY_PEER_NAME: ${PASSBOLT_PLUGINS_SMTP_SETTINGS_SECURITY_SSL_VERIFY_PEER_NAME}
      PASSBOLT_PLUGINS_SMTP_SETTINGS_SECURITY_SSL_ALLOW_SELF_SIGNED: ${PASSBOLT_PLUGINS_SMTP_SETTINGS_SECURITY_SSL_ALLOW_SELF_SIGNED}
      PASSBOLT_FULL_BASE_URL: ${PASSBOLT_FULL_BASE_URL}
      PASSBOLT_TRUST_PROXY: ${PASSBOLT_TRUST_PROXY}
      PASSBOLT_SECURITY_PROXIES_ACTIVE: ${PASSBOLT_SECURITY_PROXIES_ACTIVE}
      PASSBOLT_CHECK_DOMAIN_MISMATCH: ${PASSBOLT_CHECK_DOMAIN_MISMATCH}
    volumes:
      - ./gpg:/etc/passbolt/gpg
      - ./jwt:/etc/passbolt/jwt
      - ${SSL_CA_CERT_PATH:-./ssl/custom.crt}:/usr/local/share/ca-certificates/custom.crt:ro
      - ./scripts/entrypoint-wrapper.sh:/entrypoint-wrapper.sh:ro
    command: ["/usr/bin/wait-for.sh", "-t", "0", "${DATASOURCES_DEFAULT_HOST}:${DATASOURCES_DEFAULT_PORT}", "--", "/docker-entrypoint.sh"]
    ports:
      - ${DOCKER_HTTP_PORT}:80
      - ${DOCKER_HTTPS_PORT}:443
networks:
  default:
    external: true
    name: ${DOCKER_NETWORK_NAME}
