# =============================================================================
# Example nginx reverse proxy for Passbolt CE (docker-compose from this repo)
# =============================================================================
# This is NOT loaded by nginx automatically. Copy fragments into your layout:
#   - Debian/Ubuntu: /etc/nginx/sites-available/ → sites-enabled
#   - Or include from http {}: include /path/to/snippets/passbolt.conf;
#
# Before use, replace:
#   - pass.example.com
#   - TLS certificate and key paths
#   - Upstream address (see "Upstream" below)
#
# Passbolt .env must use the same public URL (https://pass.example.com) for
# APP_FULL_BASE_URL and PASSBOLT_FULL_BASE_URL, and typically:
#   PASSBOLT_SSL_FORCE=false
#   PASSBOLT_TRUST_PROXY=true
#   PASSBOLT_SECURITY_PROXIES_ACTIVE=true
#
# See docs/fix-update.md for troubleshooting (healthcheck, redirect loops).
# =============================================================================

# If this file is included inside http {}, you can uncomment:
# map $http_upgrade $connection_upgrade {
#     default upgrade;
#     ''      close;
# }

upstream passbolt_app {
    # --- Upstream: pick ONE pattern ---
    #
    # A) Nginx on the Docker host; Passbolt publishes HTTP (DOCKER_HTTP_PORT, e.g. 8088):
    server 127.0.0.1:8088;
    #
    # B) Nginx runs in a container on the same Docker network as Passbolt
    #    (use DOCKER_CONTAINER_NAME from .env, default often "pass"):
    # server pass:80;
    #
    keepalive 32;
}

# Optional: redirect HTTP → HTTPS (adjust server_name)
server {
    listen 80;
    listen [::]:80;
    server_name pass.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pass.example.com;

    # --- TLS (use your paths or Let's Encrypt) ---
    ssl_certificate     /etc/ssl/certs/pass.example.com.fullchain.pem;
    ssl_certificate_key /etc/ssl/private/pass.example.com.key;
    # ssl_trusted_certificate /etc/ssl/certs/pass.example.com.chain.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Uploads / attachments (adjust if your Passbolt allows larger files)
    client_max_body_size 50m;

    location / {
        proxy_pass http://passbolt_app;

        proxy_http_version 1.1;
        # If you defined $connection_upgrade in http {}, use:
        # proxy_set_header Upgrade $http_upgrade;
        # proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Forwarded "proto=$scheme;host=$host";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
